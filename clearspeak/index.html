<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Wsparcie dla PWA na iOS -->
    <meta name="apple-mobile-web-app-title" content="En Claro">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
    <title>En Claro</title>
    <style>
      /* PWA Native App Feel dla iOS/iPadOS */
      body {
        -webkit-touch-callout: none; /* Blokuje menu po długim przytrzymaniu (np. na grafikach) */
        -webkit-user-select: none; /* Blokuje przypadkowe zaznaczanie tekstu palcem */
        user-select: none;
        overscroll-behavior-y: none; /* Blokuje efekt "gumki" i odświeżania na krańcach ekranu */
      }
      input, textarea {
        -webkit-user-select: auto; /* Przywraca zaznaczanie tekstu TYLKO w polach do wpisywania (dyktanda) */
        user-select: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
