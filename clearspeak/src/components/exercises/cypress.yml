name: E2E Tests (Playwright)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  playwright-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Pobranie repozytorium
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18 # lub wyższa, dopasowana do Twojego projektu
          cache: 'npm'

      - name: Instalacja zależności
        run: npm ci

      - name: Instalacja przeglądarek dla Playwright
        run: npx playwright install --with-deps

      - name: Uruchomienie testów Playwright
        run: npx playwright test

      - name: Archiwizacja raportu Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7